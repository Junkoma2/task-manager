<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>task manager</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>task manager</h1>
        <div class="app-actions" aria-label="データ操作">
          <button id="check-update" class="quiet-action" type="button">更新</button>
          <button id="export-data" class="quiet-action" type="button">エクスポート</button>
          <button id="import-data" class="quiet-action" type="button">インポート</button>
          <input id="import-file" class="sr-only" type="file" accept="application/json" />
        </div>
      </header>

      <form class="task-form" id="task-form">
        <label class="sr-only" for="task-input">親タスクを追加</label>
        <input id="task-input" type="text" maxlength="80" placeholder="親タスクを追加" autocomplete="off" />
        <button type="submit">追加</button>
      </form>

      <section class="task-section" aria-label="タスク一覧">
        <div class="task-summary">
          <span id="open-count">0件</span>
          <button id="clear-completed" type="button">完了済みを削除</button>
        </div>
        <ul class="task-list" id="task-list"></ul>
        <p class="empty-state" id="empty-state">今日やることを追加してください。</p>
      </section>
    </main>

    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    <script src="./script.js"></script>
  </body>
</html>
