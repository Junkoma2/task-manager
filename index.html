<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>task manager</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#3B82F6" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>task manager</h1>
        <div class="app-menu" aria-label="データ操作">
          <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-haspopup="true" aria-label="その他の操作">&#9776;</button>
          <div id="menu-popup" class="menu-popup" hidden>
            <button id="check-update" class="menu-item" type="button">更新を確認</button>
            <button id="export-data" class="menu-item" type="button">エクスポート</button>
            <button id="import-data" class="menu-item" type="button">インポート</button>
          </div>
          <input id="import-file" class="sr-only" type="file" accept="application/json" />
        </div>
      </header>

      <section class="task-section" aria-label="タスク一覧">
        <div class="task-summary">
          <span id="open-count">残り0件</span>
          <button id="clear-completed" type="button">完了済みを削除</button>
        </div>
        <div class="sort-bar">
          <label for="sort-select">並び順</label>
          <select id="sort-select" class="sort-select">
            <option value="manual">手動</option>
            <option value="created-desc">追加日（新しい順）</option>
            <option value="created-asc">追加日（古い順）</option>
            <option value="due-asc">期限日（近い順）</option>
            <option value="due-desc">期限日（遠い順）</option>
          </select>
        </div>
        <ul class="task-list" id="task-list"></ul>
        <div class="empty-state" id="empty-state" aria-hidden="true">
          <svg class="empty-state-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="12" y1="9" x2="12" y2="15"/></svg>
          <p class="empty-state-text">タスクを追加してみましょう</p>
          <p class="empty-state-sub">リスト末尾の＋ボタンから追加できます</p>
        </div>
      </section>
    </main>

    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    <script src="./script.js"></script>
  </body>
</html>
