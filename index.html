<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>task manager</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#3B82F6" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>task manager</h1>
        <div class="app-menu" aria-label="データ操作">
          <button id="menu-toggle" class="menu-toggle" type="button" aria-expanded="false" aria-haspopup="true" aria-label="その他の操作">&#9776;</button>
          <div id="menu-popup" class="menu-popup" hidden>
            <button id="check-update" class="menu-item" type="button">更新を確認</button>
            <button id="export-data" class="menu-item" type="button">エクスポート</button>
            <button id="import-data" class="menu-item" type="button">インポート</button>
          </div>
          <input id="import-file" class="sr-only" type="file" accept="application/json" />
        </div>
      </header>

      <section class="task-section" aria-label="タスク一覧">
        <div class="task-summary">
          <span id="open-count">残り0件</span>
          <button id="clear-completed" type="button">完了済みを削除</button>
        </div>
        <ul class="task-list" id="task-list"></ul>
        <div class="empty-state" id="empty-state">
          <svg class="empty-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="8" y="12" width="32" height="28" rx="4" stroke="currentColor" stroke-width="2"/>
            <path d="M16 22h16M16 29h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M24 6v8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <p class="empty-main">タスクはありません</p>
          <p class="empty-hint">下の「＋ タスクを追加」から追加できます</p>
        </div>
      </section>
    </main>

    <p id="status-message" class="status-message" role="status" aria-live="polite"></p>
    <script src="./script.js"></script>
  </body>
</html>
